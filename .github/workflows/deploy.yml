name: 🚀 Deploy Production (Main)

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout código
        uses: actions/checkout@v4

      - name: 🔐 Deploy no servidor
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -e

            cd /var/www/telemedicinamedben/prod/public

            echo "🚀 Iniciando deploy..."

            echo "🔒 Colocando aplicação em manutenção..."
            php artisan down --retry=60 || true

            echo "📥 Atualizando código..."
            git fetch origin main
            git reset --hard origin/main

            echo "📦 Instalando dependências PHP..."
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

            echo "📦 Instalando dependências JS..."
            npm install  # <-- Aqui está o npm i

            echo "🏗️ Buildando assets..."
            npm run build

            echo "⚙️ Rodando migrations..."
            php artisan migrate --force

            echo "⚙️ Rodando seeds..."
            php artisan db:seed --force

            echo "⚡ Otimizando aplicação..."
            php artisan optimize
            php artisan view:cache
            php artisan event:cache

            echo "🔓 Retirando aplicação de manutenção..."
            php artisan up

            echo "✅ Deploy finalizado com sucesso!"
